name: Bug report
description: Report a reproducible problem in AI Shop OS
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, API requests, or UI steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Workflow evidence affected
      description: Which workflow, report, savings calculation, or readiness gate was affected?
    validations:
      required: false
